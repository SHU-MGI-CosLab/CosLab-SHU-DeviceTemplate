xyz_guangdian:
  action_value_mappings:
    clamp_glass:
      command: clamp_glass
      description: 夹紧玻璃
    disable:
      command: disable
      description: 禁用所有轴
    enable:
      command: enable
      description: 使能所有轴
    get_position:
      command: get_position
      description: 获取当前位置
    go_home:
      command: go_home
      description: 回零操作
    move_absolute:
      command: move_absolute
      description: 绝对移动
      parameters:
        wait_done:
          default: true
          type: bool
        x:
          default: 0.0
          type: float
          unit: mm
        y:
          default: 0.0
          type: float
          unit: mm
        z:
          default: 0.0
          type: float
          unit: mm
    move_relative:
      command: move_relative
      description: 相对移动
      parameters:
        wait_done:
          default: true
          type: bool
        x_delta:
          default: 0.0
          type: float
          unit: mm
        y_delta:
          default: 0.0
          type: float
          unit: mm
        z_delta:
          default: 0.0
          type: float
          unit: mm
    release_glass:
      command: release_glass
      description: 释放玻璃
    reset_error:
      command: reset_error
      description: 重置错误
    set_acceleration:
      command: set_acceleration
      description: 设置轴加速度
      parameters:
        accel:
          type: float
          unit: mm/s²
        axis:
          type: string
          values:
          - x
          - y
          - z
    set_speed:
      command: set_speed
      description: 设置轴速度
      parameters:
        axis:
          type: string
          values:
          - x
          - y
          - z
        speed:
          type: float
          unit: mm/s
    stop_all:
      command: stop_all
      description: 停止所有运动
